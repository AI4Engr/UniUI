name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy

    - name: Run ruff (lint + format check)
      run: |
        ruff check .
        ruff format --check .

    - name: Run black (format check)
      run: |
        black --check .

    - name: Run mypy (type check)
      run: |
        mypy src/uniui --ignore-missing-imports || true
        # || true for now until we have full type coverage

  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-tk \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0 \
          xvfb

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-xdist
        pip install -e ".[dev]"

    - name: Install optional platforms
      run: |
        # Install all platforms for comprehensive testing
        pip install PySide2 || echo "PySide2 installation failed"
        pip install wxPython || echo "wxPython installation failed"
        pip install ipywidgets || echo "ipywidgets installation failed"

    - name: Run tests with xvfb (for GUI)
      run: |
        xvfb-run -a pytest tests/ \
          --cov=src/uniui \
          --cov-report=xml \
          --cov-report=term-missing \
          -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -e ".[dev]"

    - name: Install optional platforms
      run: |
        pip install PySide2 || echo "PySide2 installation failed"
        pip install wxPython || echo "wxPython installation failed"
        pip install ipywidgets || echo "ipywidgets installation failed"

    - name: Run tests
      run: |
        pytest tests/ --cov=src/uniui --cov-report=term-missing -v

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -e ".[dev]"

    - name: Install optional platforms
      run: |
        pip install PySide2 || echo "PySide2 installation failed"
        pip install wxPython || echo "wxPython installation failed"
        pip install ipywidgets || echo "ipywidgets installation failed"

    - name: Run tests
      run: |
        pytest tests/ --cov=src/uniui --cov-report=term-missing -v

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-tk \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0 \
          xvfb

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -e ".[dev]"

    - name: Install all platforms
      run: |
        pip install PySide2 || echo "PySide2 installation failed"
        pip install wxPython || echo "wxPython installation failed"
        pip install ipywidgets || echo "ipywidgets installation failed"

    - name: Run contract tests only
      run: |
        xvfb-run -a pytest tests/contracts/ -m contract -v --tb=short

    - name: Generate contract test report
      if: always()
      run: |
        echo "## Contract Test Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Contract tests ensure consistent behavior across all platforms." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        pytest tests/contracts/ -m contract --tb=no -q >> $GITHUB_STEP_SUMMARY || true

  compatibility-check:
    name: Platform Compatibility Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check platform availability
      run: |
        python -c "
        import sys
        platforms = []

        try:
            import PySide2
            platforms.append(f'✓ Qt/PySide2 {PySide2.__version__}')
        except ImportError:
            platforms.append('✗ Qt/PySide2 not available')

        try:
            import wx
            platforms.append(f'✓ wxPython {wx.version()}')
        except ImportError:
            platforms.append('✗ wxPython not available')

        try:
            import ipywidgets
            platforms.append(f'✓ ipywidgets {ipywidgets.__version__}')
        except ImportError:
            platforms.append('✗ ipywidgets not available')

        try:
            import tkinter
            platforms.append('✓ Tkinter available')
        except ImportError:
            platforms.append('✗ Tkinter not available')

        print('Platform Compatibility:')
        for p in platforms:
            print(f'  {p}')
        "

    - name: Verify contract test coverage
      run: |
        echo "Checking contract test coverage..."
        python -c "
        import os
        from pathlib import Path

        # Get all widget types from widget_kind.py
        # Check if each has contract tests
        contracts_dir = Path('tests/contracts')
        if contracts_dir.exists():
            contract_files = list(contracts_dir.glob('test_*.py'))
            print(f'Contract test files: {len(contract_files)}')
            for f in sorted(contract_files):
                print(f'  - {f.name}')
        else:
            print('No contract tests directory found')
        "
